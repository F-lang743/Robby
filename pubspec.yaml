name: robby
description: Robby – a hands-free voice assistant for truck drivers.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Voice recognition & TTS
  speech_to_text: ^6.6.2
  flutter_tts: ^4.0.2

  # GPS / Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Mapping / routing
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Networking
  dio: ^5.7.0

  # Local caching / persistence
  shared_preferences: ^2.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Email
  url_launcher: ^6.3.1
  flutter_email_sender: ^6.0.3

  # State management
  flutter_riverpod: ^2.5.3
  riverpod_annotation: ^2.3.5

  # Utilities
  intl: ^0.19.0
  logger: ^2.4.0
  uuid: ^4.5.1
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.13
  mocktail: ^1.0.4
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
